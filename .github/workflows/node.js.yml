name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Save uploads directory if it exists
    - name: Save uploads directory
      run: |
        mkdir -p backup/uploads
        if [ -d "uploads" ]; then
          mv uploads backup/
        fi

    - run: npm ci

    - run: npm run build

    - run: |
        touch .env
        echo "${{ secrets.PROD_SECRET }}" > .env

    # Restore uploads directory
    - name: Restore uploads directory
      run: |
        if [ -d "backup/uploads" ]; then
          mv backup/uploads .
        fi

    - name: Restart application
      run: pm2 restart dist/server.js
